name: Build Orange Pi 4 Pro Image

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout build framework
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            bc bison build-essential ccache curl device-tree-compiler \
            flex gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf \
            git gnupg2 libssl-dev lzop python3-dev python3-pip \
            qemu-user-static u-boot-tools uuid-runtime \
            debootstrap kpartx parted xz-utils

      - name: Build image
        run: |
          ./compile.sh build \
            BOARD=orangepi-4pro \
            BRANCH=mainline \
            BUILD_MINIMAL=no \
            BUILD_DESKTOP=yes \
            DESKTOP_ENVIRONMENT=xfce \
            DESKTOP_ENVIRONMENT_CONFIG_NAME=config_base \
            DESKTOP_APPGROUPS_SELECTED="browsers,programming,desktop_tools,remote_desktop" \
            KERNEL_CONFIGURE=no \
            RELEASE=bookworm \
            SKIP_EXTERNAL_DRIVERS=yes \
            COMPRESS_OUTPUTIMAGE=sha,img \
            EXPERT=yes
        env:
          TERM: xterm

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: orangepi-4pro-armbian-image
          path: output/images/*.img*
          retention-days: 7
