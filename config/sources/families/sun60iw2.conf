# config/sources/families/sun60iw2.conf
declare -g LINUXFAMILY="sun60iw2"
BRANCHES="mainline"
ATF_COMPILE='no'

# Disable Armbian’s out-of-tree wireless driver patchset
WIREGUARD="no"
EXTRAWIFI="no"


KERNELDRIVERS="none"

SKIP_EXTRA_DRIVERS="yes"

# BOOTCONFIG=none is set in the board config to skip U-Boot compilation entirely.
# This board relies on the vendor bootloader already present on SD/eMMC.
# A write_uboot_platform() stub is not needed when BOOTCONFIG=none.
